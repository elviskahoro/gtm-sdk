"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
setup = """
set -e

SETUP_LOG="$HOME/.conductor-setup.log"
: > "$SETUP_LOG"
# Plain append redirect, not `exec > >(tee ...)`: some Conductor sandboxes have
# no /dev/fd, which makes bash's process-substitution fd unopenable and (with
# `set -e`) silently kills the whole script on this very line before anything
# else runs. This trades away live terminal echo for output only landing in
# the log file, which is fine since the log is the thing we audit.
exec >> "$SETUP_LOG" 2>&1
echo "=== setup started $(date -u +%FT%TZ) ==="

# All real provisioning lives in a durable, reviewable script instead of this
# heredoc. Tools come from the committed Flox environment (.flox/) on Linux
# sandboxes; see scripts/conductor-workspace-setup.sh for the full story.
bash scripts/conductor-workspace-setup.sh

echo "=== setup finished $(date -u +%FT%TZ) ==="
"""

[scripts.run.run]
available_in = "local"
command = "uv run elvis"
default = true
icon = "play"
