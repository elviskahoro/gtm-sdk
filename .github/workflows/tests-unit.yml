name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: Unit tests
    runs-on: namespace-profile-test
    steps:
      - name: Checkout
        uses: namespacelabs/nscloud-checkout-action@445c25d7009680597d73eb03c4e1cd5be522ed73 # v9.0.0
        with:
          fetch-depth: 0

      # Namespace mounts these paths directly from the runner cache volume, so
      # setup reuses the host-side Dagger SDK and uv artifacts without a
      # GitHub-hosted cache upload/download phase. The Dagger pipeline owns its
      # separate in-container `uv-cache` and `venv` volumes below.
      - name: Cache host Dagger and uv data
        id: namespace_cache
        uses: namespacelabs/nscloud-cache-action@58bf6e08898e88803c098e2b522668541cd3b2e3 # v1.6.0
        with:
          path: |
            ~/.dagger-venv
            ~/.cache/uv

      # `version` is pinned: without it the action installs the latest CLI at
      # run time, so upstream Dagger releases silently change the engine
      # version — churning the version-keyed engine state cached below and
      # forcing cold runs with no diff in this repo. Bump it deliberately, in
      # a commit (the engine cache pays one cold run per bump).
      - name: Setup Dagger
        uses: dagger/dagger-for-github@e47aba410ef9bb9ed81a4d2a97df31061e5e842e # 8.0.0
        with:
          version: 0.21.7

      # Provides uv on PATH for the next step. Pinned by SHA per repo convention;
      # the official action avoids the `curl | sh` install pattern (semgrep
      # gha-curl-pipe-shell).
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      # The Namespace runner image is Debian/PEP 668 externally-managed and its
      # system Python (/usr) is not writable without root, so neither bare `pip`
      # nor `uv pip install --system` works. Create a root-free uv venv, install
      # the host-side deps there, and prepend the venv's bin to $GITHUB_PATH so
      # the later `dagger run python ...` step resolves `python` to this venv
      # (which has dagger-io/anyio).
      - name: Install Dagger Python SDK
        run: |
          if [ -x "$HOME/.dagger-venv/bin/python" ]; then
            echo "Namespace host cache: Dagger SDK venv already exists"
          else
            echo "Namespace host cache: Dagger SDK venv is absent; creating it cold"
          fi
          uv_cache_dir="$(uv cache dir)"
          if [ -d "${uv_cache_dir}" ] && [ "$(find "${uv_cache_dir}" -mindepth 1 -print -quit 2>/dev/null)" ]; then
            echo "Namespace host cache: uv cache contains artifacts (${uv_cache_dir})"
          else
            echo "Namespace host cache: uv cache is empty (${uv_cache_dir})"
          fi
          uv venv "$HOME/.dagger-venv"
          uv pip install --python "$HOME/.dagger-venv/bin/python" dagger-io anyio
          echo "$HOME/.dagger-venv/bin" >> "$GITHUB_PATH"

      - name: Report Namespace cache state
        run: |
          echo "Namespace cache exact hit: ${{ steps.namespace_cache.outputs.cache-hit }}"
          if [ -n "${NSC_CACHE_PATH:-}" ]; then
            echo "Namespace cache volume: attached (${NSC_CACHE_PATH})"
          else
            echo "Namespace cache volume: absent"
          fi

      - name: Resolve Dagger engine version
        id: dagger_engine
        run: |
          set -uo pipefail
          version="$(dagger version 2>/dev/null | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
          if [ -z "${version}" ]; then
            echo "::warning::could not determine Dagger engine version; skipping engine caching"
          fi
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      # `dagger run` needs registry.dagger.io/engine:v<cli-version>, and that
      # registry intermittently brownouts (dagger/dagger#7548): a single blob
      # stalls and `docker pull` retries it internally for minutes (the
      # "Retrying in 5/10/15 seconds" per-layer loop) before failing, killing
      # the job before any test runs (ai-4bz). Two-layer mitigation: (1) the
      # runner profile's container-image cache serves the pull locally after
      # the first run (replaces the old tarball-in-actions/cache dance); (2) on
      # a cold miss, retry the pull with a per-attempt `timeout` so a hung blob
      # cedes to a fresh attempt instead of wedging.
      - name: Ensure Dagger engine image (resilient to registry flakiness)
        if: steps.dagger_engine.outputs.version != ''
        env:
          ENGINE_VERSION: ${{ steps.dagger_engine.outputs.version }}
        run: |
          set -uo pipefail
          image="registry.dagger.io/engine:${ENGINE_VERSION}"
          if docker image inspect "${image}" >/dev/null 2>&1; then
            echo "Dagger engine image cache: local hit (${image})"
            exit 0
          fi
          for attempt in $(seq 1 6); do
            if timeout 150 docker pull "${image}"; then
              echo "Dagger engine image cache: registry pull succeeded on attempt ${attempt} (${image})"
              exit 0
            fi
            echo "::warning::engine pull attempt ${attempt}/6 failed (registry.dagger.io flake); retrying in 20s"
            sleep 20
          done
          echo "::error::failed to pull ${image} after 6 attempts"
          exit 1

      # The CLI auto-provisions its engine as `docker run --name
      # dagger-engine-v<ver> -v /var/lib/dagger ...` — an ANONYMOUS volume on
      # an ephemeral runner, so all BuildKit state (python:3.13 base, the uv
      # install layer, the uv/venv cache volumes) died with every job and each
      # run re-downloaded ~190 packages. Start the same container ourselves
      # with /var/lib/dagger on the profile's Namespace cache volume
      # ($NSC_CACHE_PATH, exported by the runner when the profile has a cache
      # volume attached) so BuildKit state persists across runs. The CLI is
      # pointed at it two ways: the exact auto-provision name (adopted on name
      # match) AND _EXPERIMENTAL_DAGGER_RUNNER_HOST — if the CLI's name
      # derivation ever drifts the env var still wins, and the stop step below
      # asserts a single engine so drift goes red instead of silently cold.
      #
      # Concurrency: Namespace gives each job a private fork of the cache
      # volume (snapshot isolation; last clean instance exit is promoted), so
      # two concurrent runners never share a live /var/lib/dagger or race the
      # prune below — worst case is one side's warm-up being discarded.
      #
      # State is keyed per engine version (BuildKit state is not guaranteed
      # compatible across engine versions); other versions' subdirs are pruned
      # because stale state pushes the volume toward its size limit, and
      # Namespace resets a volume that exceeds it — nuking the live cache too.
      # If the engine fails to start on cached state, wipe the subdir and retry
      # cold once: a corrupt cache must cost a slow run, never a red one.
      # Cache-bust escape hatch: rename the version subdir (append e.g. "-e2").
      - name: Start Dagger engine with persistent state
        id: dagger_engine_start
        if: steps.dagger_engine.outputs.version != ''
        env:
          ENGINE_VERSION: ${{ steps.dagger_engine.outputs.version }}
          # Engine-side trace shipping needs the token at `docker run` time —
          # parity with the CLI's own `-e DAGGER_CLOUD_TOKEN` when it
          # auto-provisions.
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
        run: |
          set -uo pipefail
          name="dagger-engine-${ENGINE_VERSION}"
          if [ -z "${NSC_CACHE_PATH:-}" ]; then
            echo "::warning::no Namespace cache volume attached to this profile; falling back to a cold auto-provisioned engine"
            exit 0
          fi
          fstype="$(findmnt -no FSTYPE --target "${NSC_CACHE_PATH}" || true)"
          case "${fstype}" in
            ext4 | xfs) ;;
            *)
              echo "::warning::cache volume fstype '${fstype}' not known-good for BuildKit overlayfs; falling back to a cold auto-provisioned engine"
              exit 0
              ;;
          esac
          root="${NSC_CACHE_PATH}/dagger-engine"
          state_dir="${root}/${ENGINE_VERSION}"
          mkdir -p "${root}"
          # A failed prune must be visible: stale-version state accumulating
          # is exactly what pushes the volume into Namespace's reset path.
          if ! sudo find "${root}" -mindepth 1 -maxdepth 1 -type d ! -name "${ENGINE_VERSION}" -exec rm -rf {} +; then
            echo "::warning::failed to prune stale engine-state subdirs under ${root}; volume may drift toward its size limit"
          fi
          mkdir -p "${state_dir}"
          # Dagger's default GC sizes itself from statfs of /var/lib/dagger,
          # and Namespace volumes report dynamic sizes — defaults would grow
          # unbounded until Namespace resets the volume. Cap explicitly.
          cat >"${root}/engine.json" <<'EOF'
          {"gc": {"maxUsedSpace": "20GB", "reservedSpace": "2GB", "minFreeSpace": "4GB", "sweepSize": "50%"}}
          EOF
          start_engine() {
            docker rm -f "${name}" >/dev/null 2>&1 || true
            docker run -d --privileged --name "${name}" \
              -v "${state_dir}:/var/lib/dagger" \
              -v "${root}/engine.json:/etc/dagger/engine.json" \
              -e DAGGER_CLOUD_TOKEN \
              "registry.dagger.io/engine:${ENGINE_VERSION}"
          }
          engine_running() {
            for _ in $(seq 1 30); do
              if [ "$(docker inspect -f '{{.State.Running}}' "${name}" 2>/dev/null)" = "true" ]; then
                # A corrupt-state buildkitd starts, then exits a second or two
                # in when it fails to open its databases — require the
                # container to survive a short settle so the wipe-and-retry
                # path below catches that case instead of a red `dagger run`.
                sleep 3
                [ "$(docker inspect -f '{{.State.Running}}' "${name}" 2>/dev/null)" = "true" ] && return 0
                return 1
              fi
              sleep 1
            done
            return 1
          }
          start_engine
          if ! engine_running; then
            echo "::warning::engine failed to start on cached state; wiping ${state_dir} and retrying cold"
            docker logs "${name}" 2>&1 | tail -50 || true
            sudo rm -rf "${state_dir}"
            mkdir -p "${state_dir}"
            start_engine
            if ! engine_running; then
              # Both attempts failing means the problem is not cached state
              # (the second start had none) — e.g. the engine rejecting the
              # GC config above. Degrade to a cold auto-provisioned engine
              # like the other fallback paths; persistence failures must cost
              # a slow run, never a red one. Remove our container first or the
              # CLI's name-matching adoption would start the same broken one.
              echo "::warning::engine failed to start even on fresh state; falling back to a cold auto-provisioned engine"
              docker logs "${name}" 2>&1 | tail -50 || true
              docker rm -f "${name}" >/dev/null 2>&1 || true
              exit 0
            fi
          fi
          echo "_EXPERIMENTAL_DAGGER_RUNNER_HOST=docker-container://${name}" >>"${GITHUB_ENV}"
          echo "engine_name=${name}" >>"${GITHUB_OUTPUT}"

      - name: Report Dagger engine state
        if: always() && steps.dagger_engine.outputs.version != ''
        run: |
          if [ "${{ steps.dagger_engine_start.outputs.engine_name }}" != "" ]; then
            echo "Persistent Dagger engine: adopted (${{ steps.dagger_engine_start.outputs.engine_name }})"
          elif [ "${{ steps.dagger_engine_start.outcome }}" = "success" ]; then
            echo "Persistent Dagger engine: cold auto-provision fallback"
          else
            echo "Persistent Dagger engine: setup step did not complete"
          fi

      # DAGGER_CLOUD_TOKEN must live on the runner's process environment (not
      # inside the container) — the CLI reads it to ship traces to Dagger
      # Cloud. The value is stored in Infisical and synced into repo
      # `secrets.*` by Infisical's GitHub App integration (same path as
      # TRUNK_API_TOKEN / MODAL_TOKEN_*). See https://docs.dagger.io/reference/configuration/cloud/
      - name: Run pytest in Dagger
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
        run: dagger run python .github/workflows/ci/pytest_dagger.py

      # If this step errors "Unauthorized access, your Trunk organization URL
      # slug or token may be incorrect", it is almost always a dead/revoked
      # TRUNK_API_TOKEN, NOT the org-slug: the analytics CLI mislabels a 404 on
      # a bad token as an auth/slug error. Regenerate the org token at
      # https://app.trunk.io/sanhedrin/settings and update the GHA secret. (ai-g7i)
      - name: Upload Test Results to Trunk.io
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@1198efcc0976501147b10a7e343c3fa069527526 # v2.0.9
        with:
          junit-paths: junit.xml
          org-slug: sanhedrin
          token: ${{ secrets.TRUNK_API_TOKEN }}

      # buildkitd needs well past docker's 10s default grace to flush its
      # databases (dagger-for-github's own stop step uses -t 300); a SIGKILL'd
      # engine followed by a clean runner exit is the one path that COMMITS
      # torn state to the cache volume, so stop gracefully before the job
      # ends. Also assert exactly one engine container is running: if the
      # CLI's name derivation ever drifts from ours it spawns a second, cold
      # engine — the job would stay green while every run quietly loses the
      # cache; fail red instead.
      - name: Stop Dagger engine (flush BuildKit state)
        if: always() && steps.dagger_engine_start.outputs.engine_name != ''
        env:
          ENGINE_NAME: ${{ steps.dagger_engine_start.outputs.engine_name }}
        run: |
          set -uo pipefail
          engines="$(docker ps --format '{{.Names}}' | grep '^dagger-engine-' || true)"
          if [ -z "${engines}" ]; then
            echo "::error::engine '${ENGINE_NAME}' is no longer running — it crashed or was stopped mid-run (see docker logs below), so its state never flushed cleanly"
            docker logs "${ENGINE_NAME}" 2>&1 | tail -50 || true
            exit 1
          fi
          if [ "${engines}" != "${ENGINE_NAME}" ]; then
            echo "::error::expected exactly one running engine '${ENGINE_NAME}', found: ${engines} — the dagger CLI provisioned its own engine, so the persistent cache was not used"
            echo "${engines}" | xargs -r docker stop -t 300 || true
            exit 1
          fi
          docker stop -t 300 "${ENGINE_NAME}"
