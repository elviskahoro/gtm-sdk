name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: Unit tests
    runs-on: namespace-profile-test
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Setup Dagger
        uses: dagger/dagger-for-github@e47aba410ef9bb9ed81a4d2a97df31061e5e842e # 8.0.0

      # Provides uv on PATH for the next step. Pinned by SHA per repo convention;
      # the official action avoids the `curl | sh` install pattern (semgrep
      # gha-curl-pipe-shell).
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      # The Namespace runner image is Debian/PEP 668 externally-managed and its
      # system Python (/usr) is not writable without root, so neither bare `pip`
      # nor `uv pip install --system` works. Create a root-free uv venv, install
      # the host-side deps there, and prepend the venv's bin to $GITHUB_PATH so
      # the later `dagger run python ...` step resolves `python` to this venv
      # (which has dagger-io/anyio).
      - name: Install Dagger Python SDK
        run: |
          uv venv "$HOME/.dagger-venv"
          uv pip install --python "$HOME/.dagger-venv/bin/python" dagger-io anyio
          echo "$HOME/.dagger-venv/bin" >> "$GITHUB_PATH"

      # `dagger run` pulls registry.dagger.io/engine:v<cli-version> on first use.
      # That registry intermittently brownouts (dagger/dagger#7548): a single blob
      # stalls and `docker pull` retries it internally for minutes (the "Retrying
      # in 5/10/15 seconds" per-layer loop) before failing, killing the job before
      # any test runs — observed as repeated failures on one branch while a
      # concurrent run pulled fine (ai-4bz). Two-layer mitigation: (1) cache the
      # engine image tarball keyed on the engine version so most runs never touch
      # the registry; (2) on a cache miss, retry the pull with a per-attempt
      # `timeout` so a hung blob cedes to a fresh attempt instead of wedging. The
      # tag tracks the CLI version installed by dagger-for-github, so nothing is
      # hardcoded.
      - name: Resolve Dagger engine version
        id: dagger_engine
        run: |
          set -uo pipefail
          version="$(dagger version 2>/dev/null | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
          if [ -z "${version}" ]; then
            echo "::warning::could not determine Dagger engine version; skipping pre-pull"
          fi
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      - name: Cache Dagger engine image
        if: steps.dagger_engine.outputs.version != ''
        id: dagger_engine_cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /tmp/dagger-engine.tar
          key: dagger-engine-${{ runner.os }}-${{ steps.dagger_engine.outputs.version }}

      # Cache hit -> docker load (zero registry calls). Miss -> retry pull with a
      # per-attempt timeout, then docker save so the next run on this engine
      # version is registry-free. `dagger run` then finds the image cached locally
      # and skips its own pull.
      - name: Load or pre-pull Dagger engine image (resilient to registry flakiness)
        if: steps.dagger_engine.outputs.version != ''
        env:
          ENGINE_VERSION: ${{ steps.dagger_engine.outputs.version }}
          CACHE_HIT: ${{ steps.dagger_engine_cache.outputs.cache-hit }}
        run: |
          set -uo pipefail
          image="registry.dagger.io/engine:${ENGINE_VERSION}"
          tarball="/tmp/dagger-engine.tar"
          if [ "${CACHE_HIT}" = "true" ] && [ -f "${tarball}" ]; then
            echo "Loading ${image} from cache (${tarball})"
            if docker load -i "${tarball}"; then
              echo "Loaded ${image} from cache; skipping registry pull"
              exit 0
            fi
            echo "::warning::cached engine tarball failed to load; falling back to registry pull"
          fi
          echo "Pulling ${image} from registry"
          for attempt in $(seq 1 6); do
            if timeout 150 docker pull "${image}"; then
              echo "Pulled ${image} on attempt ${attempt}"
              # Fail closed on the cache, not the job: the engine is already in the
              # local daemon so this run proceeds regardless. A partial/failed save
              # must NOT be persisted by actions/cache or every later run loads a
              # broken tarball — delete it so the cache step finds nothing to store.
              if docker save "${image}" -o "${tarball}"; then
                echo "Saved ${image} to ${tarball} for future runs"
              else
                echo "::warning::docker save failed; removing partial tarball so a bad cache is not persisted"
                rm -f "${tarball}"
              fi
              exit 0
            fi
            echo "::warning::engine pull attempt ${attempt}/6 failed (registry.dagger.io flake); retrying in 20s"
            sleep 20
          done
          echo "::error::failed to pull ${image} after 6 attempts"
          exit 1

      # DAGGER_CLOUD_TOKEN must live on the runner's process environment (not
      # inside the container) — the host-side Dagger engine reads it to ship
      # traces to Dagger Cloud. The value is stored in Infisical and synced into
      # repo `secrets.*` by Infisical's GitHub App integration (same path as
      # TRUNK_API_TOKEN / MODAL_TOKEN_*). See https://docs.dagger.io/reference/configuration/cloud/
      - name: Run pytest in Dagger
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
        run: dagger run python .github/workflows/ci/pytest_dagger.py

      # If this step errors "Unauthorized access, your Trunk organization URL
      # slug or token may be incorrect", it is almost always a dead/revoked
      # TRUNK_API_TOKEN, NOT the org-slug: the analytics CLI mislabels a 404 on
      # a bad token as an auth/slug error. Regenerate the org token at
      # https://app.trunk.io/sanhedrin/settings and update the GHA secret. (ai-g7i)
      - name: Upload Test Results to Trunk.io
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@1198efcc0976501147b10a7e343c3fa069527526 # v2.0.9
        with:
          junit-paths: junit.xml
          org-slug: sanhedrin
          token: ${{ secrets.TRUNK_API_TOKEN }}
