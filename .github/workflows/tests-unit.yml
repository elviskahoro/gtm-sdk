name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger for cache/perf measurement runs (issues #303/#305) —
  # avoids the `# RUN #N` marker-commit pattern.
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pytest:
    name: Unit tests
    runs-on: namespace-profile-test
    steps:
      - name: Checkout
        uses: namespacelabs/nscloud-checkout-action@445c25d7009680597d73eb03c4e1cd5be522ed73 # v9.0.0
        with:
          fetch-depth: 0

      # Must run BEFORE the Namespace cache step: `cache: uv` planning shells
      # out to `uv cache dir` (via spacectl), so a missing uv binary fails the
      # whole job before any test runs (run 29462473211). Needs the checkout
      # first — the uv version is resolved from pyproject.toml. Pinned by SHA
      # per repo convention; the official action avoids the `curl | sh`
      # install pattern (semgrep gha-curl-pipe-shell).
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          # The Namespace cache step below owns uv's cache dir and toolchains;
          # setup-uv's own cache layer stays disabled to avoid double ownership.
          enable-cache: false

      # Ensure uv's cache directory exists before the Namespace cache action
      # links its managed path.
      - name: Prepare host uv cache
        run: |
          mkdir -p "$(uv cache dir)"

      # Namespace mounts these paths directly from the runner cache volume, so
      # setup reuses the host-side Dagger venv and uv-managed interpreter
      # without a GitHub-hosted cache upload/download phase. Keep the paths
      # explicit so the venv and its interpreter remain independently visible.
      #
      # Namespace cache-volume semantics (#330): every job receives a FORK of
      # a committed volume generation; a clean job exit commits the fork as
      # the new parent (last write wins), and Namespace explicitly serves a
      # STALE generation rather than delaying startup ("applications should
      # not assume that the cache contents match exactly the last committed
      # version"). A restored generation is therefore only a candidate cache
      # hit. The read-only `uv sync --check` below validates the actual
      # environment before the workflow decides whether dependency
      # synchronization is necessary; no sidecar file is authoritative.
      - name: Cache host Dagger and uv data
        id: namespace_cache
        uses: namespacelabs/nscloud-cache-action@58bf6e08898e88803c098e2b522668541cd3b2e3 # v1.6.0
        with:
          # In v1.6.0, `cache: uv` mounts only ~/.cache/uv. Keep the host SDK
          # venv and its uv-managed CPython as siblings under one mount
          # (~/.dagger-sdk/{venv,uv-python}). uv cannot copy the interpreter
          # into the venv (astral-sh/uv#17754), and pointing `uv venv` at the
          # mount root itself detaches the Namespace bind (issue #303) so
          # contents never persist.
          cache: uv
          path: |
            ~/.dagger-sdk/venv
            ~/.dagger-sdk/uv-python

      # Capture the mounted state BEFORE any step mutates it, so a stale or
      # unwritten fork is diagnosable from logs alone (#330): bind-mount
      # presence and the fork's cache-dir inventory + mtimes (generation age).
      - name: Report mounted cache diagnostics
        run: |
          set -uo pipefail
          uv_cache_dir="$(uv cache dir)"
          echo "Namespace mount cache-hit output: ${{ steps.namespace_cache.outputs.cache-hit }}"
          findmnt -R "${uv_cache_dir}" || echo "findmnt: ${uv_cache_dir} is not a mount point"
          findmnt -R "$HOME/.dagger-sdk/venv" || echo "findmnt: $HOME/.dagger-sdk/venv is not a mount point"
          findmnt -R "$HOME/.dagger-sdk/uv-python" || echo "findmnt: $HOME/.dagger-sdk/uv-python is not a mount point"
          if [ -n "${NSC_CACHE_PATH:-}" ]; then
            echo "Cache volume inventory (${NSC_CACHE_PATH}):"
            ls -la "${NSC_CACHE_PATH}" || true
          else
            echo "Cache volume inventory: NSC_CACHE_PATH is unset"
          fi

      # `version` is pinned: without it the action installs the latest CLI at
      # run time, so upstream Dagger releases silently change the engine
      # version — churning the version-keyed engine state cached below and
      # forcing cold runs with no diff in this repo. Bump it deliberately, in
      # a commit (the engine cache pays one cold run per bump).
      - name: Setup Dagger
        uses: dagger/dagger-for-github@e47aba410ef9bb9ed81a4d2a97df31061e5e842e # 8.0.0
        with:
          version: 0.21.7

      # The Namespace runner image is Debian/PEP 668 externally-managed and its
      # system Python (/usr) is not writable without root, so neither bare `pip`
      # nor `uv pip install --system` works. Create a root-free uv venv, install
      # the host-side deps there, and prepend the venv's bin to $GITHUB_PATH so
      # the later `dagger run python ...` step resolves `python` to this venv
      # (which has dagger-io/anyio).
      - name: Install Dagger Python SDK
        run: |
          # ~/.dagger-sdk is the Namespace mount. Never delete/recreate that
          # directory (uv venv --clear on the mount root does) — that detaches
          # the bind and the tree silently stops persisting (cold in 5/5
          # measured runs, issue #303). The venv lives at a subdirectory so
          # cold recreate can replace it freely; the toolchain is a sibling
          # so one mount restores bin/python's symlink target.
          #
          # Override setup-uv's default install dir only after the cache mount
          # above — that path is not mounted yet during Install uv.
          export UV_PYTHON_INSTALL_DIR="$HOME/.dagger-sdk/uv-python"
          dagger_venv="$HOME/.dagger-sdk/venv"
          mkdir -p "$HOME/.dagger-sdk"
          if err="$("${dagger_venv}/bin/python" -c 'import dagger, anyio' 2>&1)"; then
            echo "Namespace host cache: Dagger SDK venv already exists (cache hit)"
          else
            echo "Namespace host cache: Dagger SDK venv is absent or stale; creating it cold (validation error: ${err})"
            # Force the managed interpreter into the sibling tree. Plain
            # `uv venv` may reuse a pre-existing install under setup-uv's
            # default directory and symlink outside ~/.dagger-sdk.
            uv python install --reinstall 3.13
            # The Namespace action bind-mounts these directories. Clear the
            # venv contents without attempting to remove its mount point.
            uv venv --clear --python 3.13 "${dagger_venv}"
            target="$(readlink -f "${dagger_venv}/bin/python" 2>/dev/null || readlink "${dagger_venv}/bin/python")"
            case "${target}" in
              "$HOME/.dagger-sdk"/*) ;;
              *)
                echo "::error::interpreter escaped ~/.dagger-sdk (${target}); refusing to cache a non-self-contained SDK venv"
                exit 1
                ;;
            esac
            uv pip install --python "${dagger_venv}/bin/python" dagger-io anyio
          fi
          uv_cache_dir="$(uv cache dir)"
          if [ -d "${uv_cache_dir}" ] && [ "$(find "${uv_cache_dir}" -mindepth 1 -print -quit 2>/dev/null)" ]; then
            echo "Namespace host cache: uv cache contains artifacts (${uv_cache_dir})"
          else
            echo "Namespace host cache: uv cache is empty (${uv_cache_dir})"
          fi
          if [ -d "${UV_PYTHON_INSTALL_DIR}" ] && [ "$(find "${UV_PYTHON_INSTALL_DIR}" -mindepth 1 -print -quit 2>/dev/null)" ]; then
            echo "Namespace host cache: uv Python toolchain is sibling under ~/.dagger-sdk (${UV_PYTHON_INSTALL_DIR})"
          else
            echo "Namespace host cache: uv Python toolchain is absent (${UV_PYTHON_INSTALL_DIR})"
          fi
          echo "UV_PYTHON_INSTALL_DIR=${UV_PYTHON_INSTALL_DIR}" >> "$GITHUB_ENV"
          echo "${dagger_venv}/bin" >> "$GITHUB_PATH"

      # Warm the project dependency cache on the host before starting Dagger.
      # The Namespace action persists ~/.cache/uv plus the explicit SDK paths
      # above, while the fresh Dagger engine only receives a snapshot of the
      # host uv cache. Namespace may restore a stale generation, so inspect the
      # installed environment directly instead of trusting sidecar metadata.
      - name: Warm project uv cache
        run: |
          set -euo pipefail
          # Reuse the Namespace-persisted SDK venv for project dependencies.
          # The lock/Python/architecture hash is diagnostic only; uv's check of
          # the restored environment is the correctness boundary.
          project_env="$HOME/.dagger-sdk/venv"
          environment_key="$({
            sha256sum pyproject.toml uv.lock
            printf '%s\n' 'python=3.13' "arch=$(uname -m)"
          } | sha256sum | cut -d' ' -f1)"

          check_project_env() {
            UV_PROJECT_ENVIRONMENT="${project_env}" uv sync \
              --all-extras --dev --locked --no-install-project --inexact --check \
              --python "${project_env}/bin/python"
          }

          validation_output=""
          if validation_output="$(check_project_env 2>&1)"; then
            printf '%s\n' "${validation_output}"
            echo "Host project uv cache: exact hit (${environment_key})"
          else
            echo "Host project uv cache: miss or stale; syncing dependencies (${environment_key})"
            # uv's failed check describes the installed-package delta that
            # makes this restored generation stale (or why it was unreadable).
            echo "Host project uv cache validation delta:"
            printf '%s\n' "${validation_output}"
            if [ ! -x "${project_env}/bin/python" ]; then
              uv venv --python 3.13 "${project_env}"
            fi
            UV_PROJECT_ENVIRONMENT="${project_env}" uv sync \
              --all-extras --dev --locked --no-install-project --inexact \
              --python "${project_env}/bin/python"
            # Never proceed with a partially reconciled environment.
            check_project_env
            echo "Host project uv cache: refreshed (${environment_key})"
          fi
          # Install only the local project package into the warmed environment.
          # A non-editable install keeps Dagger workers independent of the
          # runner checkout path without recreating the dependency graph.
          uv pip install --no-deps --reinstall \
            --python "${project_env}/bin/python" .
          uv pip install --no-deps --reinstall \
            --python "${project_env}/bin/python" \
            "dagger-io==0.21.7" "anyio==4.13.0"
          if [ -x "${project_env}/bin/python" ] &&
            resolved_interpreter="$("${project_env}/bin/python" -c 'import sys; print(sys.executable)')"; then
            echo "Host project uv cache interpreter: ${project_env}/bin/python"
            echo "Host project uv cache resolved interpreter: ${resolved_interpreter}"
          else
            echo "Host project uv cache interpreter: invalid or absent"
          fi
          echo "Host project uv cache environment key: ${environment_key}"
          if [ -d "${UV_PYTHON_INSTALL_DIR}" ] &&
            [ "$(find "${UV_PYTHON_INSTALL_DIR}" -mindepth 1 -print -quit 2>/dev/null)" ]; then
            echo "Host project uv cache toolchain: ${UV_PYTHON_INSTALL_DIR}"
            echo "Host project uv cache toolchain state: present"
          else
            echo "Host project uv cache toolchain: ${UV_PYTHON_INSTALL_DIR}"
            echo "Host project uv cache toolchain state: absent"
          fi

      - name: Report Namespace cache state
        run: |
          echo "Namespace cache exact hit: ${{ steps.namespace_cache.outputs.cache-hit }}"
          if [ -n "${NSC_CACHE_PATH:-}" ]; then
            echo "Namespace cache volume: attached (${NSC_CACHE_PATH})"
          else
            echo "Namespace cache volume: absent"
          fi

      - name: Resolve Dagger engine version
        id: dagger_engine
        run: |
          set -uo pipefail
          version="$(dagger version 2>/dev/null | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
          if [ -z "${version}" ]; then
            echo "::warning::could not determine Dagger engine version; skipping engine caching"
          fi
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      # `dagger run` needs registry.dagger.io/engine:v<cli-version>, and that
      # registry intermittently brownouts (dagger/dagger#7548): a single blob
      # stalls and `docker pull` retries it internally for minutes (the
      # "Retrying in 5/10/15 seconds" per-layer loop) before failing, killing
      # the job before any test runs (ai-4bz). Two-layer mitigation: (1) the
      # runner profile's container-image cache serves the pull locally after
      # the first run (replaces the old tarball cache dance); (2) on
      # a cold miss, retry the pull with a per-attempt `timeout` so a hung blob
      # cedes to a fresh attempt instead of wedging.
      - name: Ensure Dagger engine image (resilient to registry flakiness)
        if: steps.dagger_engine.outputs.version != ''
        env:
          ENGINE_VERSION: ${{ steps.dagger_engine.outputs.version }}
        run: |
          set -uo pipefail
          image="registry.dagger.io/engine:${ENGINE_VERSION}"
          if docker image inspect "${image}" >/dev/null 2>&1; then
            echo "Dagger engine image cache: local hit (${image})"
            exit 0
          fi
          for attempt in $(seq 1 6); do
            if timeout 150 docker pull "${image}"; then
              echo "Dagger engine image cache: registry pull succeeded on attempt ${attempt} (${image})"
              exit 0
            fi
            echo "::warning::engine pull attempt ${attempt}/6 failed (registry.dagger.io flake); retrying in 20s"
            sleep 20
          done
          echo "::error::failed to pull ${image} after 6 attempts"
          exit 1

      # Use a fresh auto-provisioned engine for every job. The Namespace
      # profile's local Docker cache retains the outer engine image, while the
      # host uv and SDK caches above remain independently persistent. Dagger's
      # inner BuildKit layers and cache volumes intentionally do not persist.

      # DAGGER_CLOUD_TOKEN must live on the runner's process environment (not
      # inside the container) — the CLI reads it to ship traces to Dagger
      # Cloud. The value is stored in Infisical and synced into repo
      # `secrets.*` by Infisical's GitHub App integration (same path as
      # TRUNK_API_TOKEN / MODAL_TOKEN_*). Cloud tracing is optional: forked PRs
      # and manually dispatched runs may not receive repository secrets, so use
      # a fresh local engine when the token is unavailable.
      - name: Run pytest in Dagger
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_COMPUTE_TOKEN }}
        run: |
          if [ -n "${DAGGER_CLOUD_TOKEN:-}" ]; then
            echo "Dagger Cloud: enabled"
            dagger --cloud run python .github/workflows/ci/pytest_dagger.py
          else
            echo "Dagger Cloud: disabled (DAGGER_CLOUD_COMPUTE_TOKEN is unavailable)"
            DAGGER_NO_NAG=1 dagger run python .github/workflows/ci/pytest_dagger.py
          fi

      # If this step errors "Unauthorized access, your Trunk organization URL
      # slug or token may be incorrect", it is almost always a dead/revoked
      # TRUNK_API_TOKEN, NOT the org-slug: the analytics CLI mislabels a 404 on
      # a bad token as an auth/slug error. Regenerate the org token at
      # https://app.trunk.io/sanhedrin/settings and update the GHA secret. (ai-g7i)
      - name: Upload Test Results to Trunk.io
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@1198efcc0976501147b10a7e343c3fa069527526 # v2.0.9
        with:
          junit-paths: junit.xml
          org-slug: sanhedrin
          token: ${{ secrets.TRUNK_API_TOKEN }}
          # Avoid resolving `latest` before looking up the cached binary.
          cli-version: 0.14.0
          # Cache the analytics CLI to avoid downloading it on every test run.
          use-cache: true
