name: Integration tests

on:
  schedule:
    - cron: "0 12 * * *" # trunk-ignore(yamllint/quoted-strings)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pytest-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Setup Dagger
        uses: dagger/dagger-for-github@e47aba410ef9bb9ed81a4d2a97df31061e5e842e # 8.0.0

      - name: Install Dagger Python SDK
        run: pip install dagger-io anyio

      # See tests-unit.yml for the full rationale: registry.dagger.io brownouts
      # (dagger/dagger#7548) stall the first-use engine image pull and kill the job
      # before any test runs. Two-layer mitigation: cache the engine tarball keyed
      # on the engine version so most runs skip the registry, and on a miss retry
      # the pull with a per-attempt timeout so a hung blob cedes to a fresh attempt.
      - name: Resolve Dagger engine version
        id: dagger_engine
        run: |
          set -uo pipefail
          version="$(dagger version 2>/dev/null | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
          if [ -z "${version}" ]; then
            echo "::warning::could not determine Dagger engine version; skipping pre-pull"
          fi
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      - name: Cache Dagger engine image
        if: steps.dagger_engine.outputs.version != ''
        id: dagger_engine_cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /tmp/dagger-engine.tar
          key: dagger-engine-${{ runner.os }}-${{ steps.dagger_engine.outputs.version }}

      - name: Load or pre-pull Dagger engine image (resilient to registry flakiness)
        if: steps.dagger_engine.outputs.version != ''
        env:
          ENGINE_VERSION: ${{ steps.dagger_engine.outputs.version }}
          CACHE_HIT: ${{ steps.dagger_engine_cache.outputs.cache-hit }}
        run: |
          set -uo pipefail
          image="registry.dagger.io/engine:${ENGINE_VERSION}"
          tarball="/tmp/dagger-engine.tar"
          if [ "${CACHE_HIT}" = "true" ] && [ -f "${tarball}" ]; then
            echo "Loading ${image} from cache (${tarball})"
            if docker load -i "${tarball}"; then
              echo "Loaded ${image} from cache; skipping registry pull"
              exit 0
            fi
            echo "::warning::cached engine tarball failed to load; falling back to registry pull"
          fi
          echo "Pulling ${image} from registry"
          for attempt in $(seq 1 6); do
            if timeout 150 docker pull "${image}"; then
              echo "Pulled ${image} on attempt ${attempt}"
              # Fail closed on the cache, not the job: the engine is already in the
              # local daemon so this run proceeds regardless. A partial/failed save
              # must NOT be persisted by actions/cache or every later run loads a
              # broken tarball — delete it so the cache step finds nothing to store.
              if docker save "${image}" -o "${tarball}"; then
                echo "Saved ${image} to ${tarball} for future runs"
              else
                echo "::warning::docker save failed; removing partial tarball so a bad cache is not persisted"
                rm -f "${tarball}"
              fi
              exit 0
            fi
            echo "::warning::engine pull attempt ${attempt}/6 failed (registry.dagger.io flake); retrying in 20s"
            sleep 20
          done
          echo "::error::failed to pull ${image} after 6 attempts"
          exit 1

      # DAGGER_CLOUD_TOKEN must live on the runner's process environment (not
      # inside the container) — the host-side Dagger engine reads it to ship
      # traces to Dagger Cloud. The value is stored in Infisical and synced into
      # repo `secrets.*` by Infisical's GitHub App integration (same path as the
      # ATTIO/MODAL/PARALLEL keys below). See https://docs.dagger.io/reference/configuration/cloud/
      - name: Run integration pytest in Dagger
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          ATTIO_API_KEY: ${{ secrets.ATTIO_API_KEY }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
        run: dagger run python .github/workflows/ci/pytest_integration_dagger.py

      # If this step errors "Unauthorized access, your Trunk organization URL
      # slug or token may be incorrect", it is almost always a dead/revoked
      # TRUNK_API_TOKEN, NOT the org-slug: the analytics CLI mislabels a 404 on
      # a bad token as an auth/slug error. Regenerate the org token at
      # https://app.trunk.io/sanhedrin/settings and update the GHA secret. (ai-g7i)
      - name: Upload Test Results to Trunk.io
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@1198efcc0976501147b10a7e343c3fa069527526 # v2.0.9
        with:
          junit-paths: junit.xml
          org-slug: sanhedrin
          token: ${{ secrets.TRUNK_API_TOKEN }}
          # Avoid resolving `latest` before looking up the cached binary.
          cli-version: 0.14.0
          # Cache the analytics CLI to avoid downloading it on every test run.
          use-cache: true
