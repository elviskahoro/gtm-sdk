name: Integration tests

on:
  schedule:
    - cron: "0 12 * * *" # trunk-ignore(yamllint/quoted-strings)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pytest-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Setup Dagger
        uses: dagger/dagger-for-github@e47aba410ef9bb9ed81a4d2a97df31061e5e842e # 8.0.0

      - name: Install Dagger Python SDK
        run: pip install dagger-io anyio

      # See tests-unit.yml: `dagger run`'s first-use engine image pull intermittently
      # times out during registry.dagger.io brownouts and fails the job before any
      # test runs. Pre-pull with retry so a flaky pull self-heals.
      - name: Pre-pull Dagger engine image (resilient to registry flakiness)
        run: |
          set -uo pipefail
          version="$(dagger version 2>/dev/null | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
          if [ -z "${version}" ]; then
            echo "::warning::could not determine Dagger engine version; skipping pre-pull"
            exit 0
          fi
          image="registry.dagger.io/engine:${version}"
          echo "Pre-pulling ${image}"
          for attempt in $(seq 1 6); do
            if docker pull "${image}"; then
              echo "Pulled ${image} on attempt ${attempt}"
              exit 0
            fi
            echo "::warning::engine pull attempt ${attempt}/6 failed (registry.dagger.io flake); retrying in 20s"
            sleep 20
          done
          echo "::error::failed to pull ${image} after 6 attempts"
          exit 1

      # DAGGER_CLOUD_TOKEN must live on the runner's process environment (not
      # inside the container) — the host-side Dagger engine reads it to ship
      # traces to Dagger Cloud. The value is stored in Infisical and synced into
      # repo `secrets.*` by Infisical's GitHub App integration (same path as the
      # ATTIO/MODAL/PARALLEL keys below). See https://docs.dagger.io/reference/configuration/cloud/
      - name: Run integration pytest in Dagger
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          ATTIO_API_KEY: ${{ secrets.ATTIO_API_KEY }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
        run: dagger run python .github/workflows/ci/pytest_integration_dagger.py

      # If this step errors "Unauthorized access, your Trunk organization URL
      # slug or token may be incorrect", it is almost always a dead/revoked
      # TRUNK_API_TOKEN, NOT the org-slug: the analytics CLI mislabels a 404 on
      # a bad token as an auth/slug error. Regenerate the org token at
      # https://app.trunk.io/sanhedrin/settings and update the GHA secret. (ai-g7i)
      - name: Upload Test Results to Trunk.io
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@1198efcc0976501147b10a7e343c3fa069527526 # v2.0.9
        with:
          junit-paths: junit.xml
          org-slug: sanhedrin
          token: ${{ secrets.TRUNK_API_TOKEN }}
