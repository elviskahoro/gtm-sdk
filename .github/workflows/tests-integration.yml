name: Integration tests

on:
  schedule:
    - cron: "0 12 * * *" # trunk-ignore(yamllint/quoted-strings)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pytest-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Setup Dagger
        uses: dagger/dagger-for-github@e47aba410ef9bb9ed81a4d2a97df31061e5e842e # 8.0.0

      - name: Install Dagger Python SDK
        run: pip install dagger-io anyio

      # See tests-unit.yml for the full rationale (ai-bic). `--cloud` runs the
      # pipeline on a managed Dagger Cloud engine instead of one inside the
      # runner, so the runner never pulls registry.dagger.io/engine and is immune
      # to that registry's brownouts (dagger/dagger#7548) — superseding the
      # cache+timeout mitigation in #221. The Python SDK's dagger.connection()
      # reuses the CLI's session, so the source dir, the ATTIO/MODAL/PARALLEL
      # secrets (forwarded as Dagger secrets), and the uv-cache volume stream to
      # the cloud engine unchanged.
      #
      # Token model: `--cloud` authenticates with a Dagger Cloud *Compute Token*
      # (DAGGER_CLOUD_COMPUTE_TOKEN), distinct from the *Telemetry Token* in
      # DAGGER_CLOUD_TOKEN. The CLI only reads DAGGER_CLOUD_TOKEN, so the
      # compute-token secret is mapped onto that var for this step; the telemetry
      # secret is left untouched and the cloud engine ships its own traces. Both
      # come from Infisical via the GitHub App sync.
      # See https://docs.dagger.io/reference/configuration/cloud/
      - name: Run integration pytest in Dagger (Cloud engine)
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_COMPUTE_TOKEN }}
          ATTIO_API_KEY: ${{ secrets.ATTIO_API_KEY }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
        run: dagger --cloud run python .github/workflows/ci/pytest_integration_dagger.py

      # If this step errors "Unauthorized access, your Trunk organization URL
      # slug or token may be incorrect", it is almost always a dead/revoked
      # TRUNK_API_TOKEN, NOT the org-slug: the analytics CLI mislabels a 404 on
      # a bad token as an auth/slug error. Regenerate the org token at
      # https://app.trunk.io/sanhedrin/settings and update the GHA secret. (ai-g7i)
      - name: Upload Test Results to Trunk.io
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@1198efcc0976501147b10a7e343c3fa069527526 # v2.0.9
        with:
          junit-paths: junit.xml
          org-slug: sanhedrin
          token: ${{ secrets.TRUNK_API_TOKEN }}
