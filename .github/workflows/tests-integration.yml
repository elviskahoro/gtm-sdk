name: integration

on:
  schedule:
    - cron: "0 12 * * *" # trunk-ignore(yamllint/quoted-strings)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pytest-integration:
    name: pytest -m integration (Dagger)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Dagger
        uses: dagger/dagger-for-github@8.0.0

      - name: Install Dagger Python SDK
        run: pip install dagger-io anyio

      - name: Run integration pytest in Dagger
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
        run: dagger run python .github/workflows/ci/pytest_integration_dagger.py

      - name: Upload Test Results to Trunk.io
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@main
        with:
          junit-paths: junit.xml
          org-slug: sanhedrin
          token: ${{ secrets.TRUNK_API_TOKEN }}
