# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
#
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
    - id: oss-linter-trunk
      ref: v0.2026.04.14.00.00
      uri: https://github.com/elviskahoro/oss-linter-trunk
#
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  definitions:
    - name: ruff
      commands:
        - name: format
          enabled: true
  enabled:
    - actionlint@1.7.11
    - bandit@1.9.4
    - checkov@3.2.521
    - markdown-link-check@3.14.2
    - markdownlint-cli2@0.22.0
    - osv-scanner@2.3.5
    - oxipng@10.1.0
    - pyright@1.1.409
    - ruff@0.15.11
    - semgrep@1.159.0
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - squawk@2.47.0
    - svgo@4.0.1
    - taplo@0.10.0
    - trivy@0.69.3
    - trufflehog@3.94.1
    - ty@0.0.26
    - yamlfmt@0.20.0
    - yamllint@1.38.0
  disabled:
    - ansible-lint
    - autopep8
    - biome
    - black
    - brakeman
    - buf-breaking
    - buf-format
    - buf-lint
    - buildifier
    - cfnlint
    - circleci
    - clang-format
    - clang-tidy
    - clippy
    - cmake-format
    - codespell
    - cspell
    - cue-fmt
    - dart
    - deno
    - detekt
    - detekt-explicit
    - detekt-gradle
    - djlint
    - dotenv-linter
    - dotnet-format
    - dustilock
    - eslint
    - flake8
    - git-diff-check
    - gitleaks
    - gofmt
    - gofumpt
    - goimports
    - gokart
    - golangci-lint
    - golangci-lint2
    - golines
    - google-java-format
    - graphql-schema-linter
    - hadolint
    - haml-lint
    - include-what-you-use
    - isort
    - ktlint
    - kube-linter
    - ls-lint
    - markdown-table-prettify
    - markdownlint
    - mypy
    - nancy
    - nbstripout
    - nixpkgs-fmt
    - opa
    - perlcritic
    - perltidy
    - php-cs-fixer
    - phpstan
    - pmd
    - pragma-once
    - pre-commit-hooks
    - prettier
    - prisma
    - psscriptanalyzer
    - pylint
    - regal
    - remark-lint
    - renovate
    - rome
    - rubocop
    - ruff-nbqa
    - rufo
    - rumdl
    - rustfmt
    - scalafmt
    - snyk
    - sort-package-json
    - sourcery
    - sql-formatter
    - sqlfluff
    - sqlfmt
    - standardrb
    - stringslint
    - stylelint
    - stylua
    - swiftformat
    - swiftlint
    - terraform
    - terragrunt
    - terrascan
    - tflint
    - tfsec
    - tofu
    - trufflehog-git
    - trunk-toolbox
    - txtpbfmt
    - vale
    - yapf
  ignore:
    - linters: [ALL]
      paths:
        - alembic/**
        - archive/**
        - data/**
        - obsidian/**
        - tmp/**
    - linters: [ruff]
      paths:
        - integration/benchmarks/**
        - "*.ipynb"
    - linters: [checkov, semgrep]
      paths:
        - .agents/skills/**
        - "**/*.py"
        - "**/*.sh"
        - "**/*.md"
    - linters: [markdown-link-check, markdownlint-cli2, trivy]
      paths:
        - .agents/skills/**
        - design/**
    - linters: [trivy]
      paths:
        - .trunk/**
        - sdks/**
    - linters: [markdown-link-check, markdownlint-cli2]
      paths:
        - projects/**
  exported_configs:
    - plugin_id: oss-linter-trunk
      configs:
        - configs/.bandit
        - configs/.clang-format
        - configs/.clang-tidy
        - configs/.clangd
        - configs/.editorconfig
        - configs/.flake8
        - configs/.gitattributes
        - configs/.gitignore
        - configs/.hadolint.yaml
        - configs/.isort.cfg
        - configs/.markdownlint.yaml
        - configs/.mypy.ini
        - configs/.pr-labels.yaml
        - configs/.prettierrc.yaml
        - configs/.pylintrc
        - configs/.remarkrc.yaml
        - configs/.shellcheckrc
        - configs/.sqlfluff
        - configs/.stylelintrc.js
        - configs/.stylelintrc.yaml
        - configs/.yamlfmt
        - configs/.yamllint.yaml
        - configs/pyrightconfig.json
        - configs/ruff.toml
        - configs/rustfmt.toml
        - configs/svgo.config.js
actions:
  enabled:
    - git-lfs
    - trunk-announce
    - trunk-cache-prune
    - trunk-upgrade-available
    - trunk-check-pre-push
  disabled:
    - trunk-fmt-pre-commit
