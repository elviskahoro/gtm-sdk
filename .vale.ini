StylesPath = docs/styles
Vocab = Mintlify

# Treat Mintlify's .mdx files as plain Markdown rather than Vale's native mdx
# format, which shells out to the external `mdx2vast` npm package. Losing
# JSX-aware skipping is an acceptable trade-off for not adding a Node
# dependency to the lint toolchain.
[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = Vale
