StylesPath = docs/styles
Vocab = GtmSdk

# Treat documentation .mdx files as plain Markdown rather than Vale's native mdx
# format, which shells out to the external `mdx2vast` npm package. Losing
# JSX-aware skipping is an acceptable trade-off for not adding a Node
# dependency to the lint toolchain.
[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = Vale

# Generated CLI reference pages render the CLI's own --help text (option
# names, snake_case identifiers, terminal prose) — prose-linting them would
# force awkward rewrites of help strings. Source of truth is cli/ help text.
[docs/cli/*.mdx]
BasedOnStyles =
